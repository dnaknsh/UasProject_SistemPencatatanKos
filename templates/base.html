<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kos Anya 𓁹‿𓁹</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts untuk Font Ceria khas Anya -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS Anya Pink-White Theme -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- NAVBAR NIKMATI GAYA EDEN ACADEMY -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 sticky-top">
      <div class="container">
        <!-- Logo & Stiker Anya -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('dashboard') if session.get('admin_logged_in') else url_for('login') }}">
          <img src="https://cdn-icons-png.flaticon.com/512/4281/4281896.png" alt="Anya Icon" width="36" height="36">
          <span style="font-family: 'Fredoka', cursive; font-size: 1.3rem;">Sistem Kos Anya</span>
        </a>
        
        {% if session.get('admin_logged_in') %}
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
          <!-- Menu Navigasi Admin -->
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-3">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('penghuni') }}">Data Penghuni</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('pembayaran') }}">Data Pembayaran</a>
            </li>
          </ul>
          
          <!-- Tombol Logout & Greeting -->
          <div class="d-flex align-items-center gap-3">
            <span class="text-light fw-semibold" style="font-size: 0.9rem;">
              Halo, <strong>{{ session.get('username') }}</strong>! 🥜
            </span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm px-3 style-logout">Keluar</a>
          </div>
        </div>
        {% endif %}
      </div>
    </nav>

    <!-- KONTEN UTAMA -->
    <div class="container pb-5">
        {% block content %}
        <!-- Konten dari file HTML lain (login, dashboard, dll) akan masuk ke sini -->
        {% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
