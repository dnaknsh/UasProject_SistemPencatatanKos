{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Tambah Catatan Pembayaran</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('tambah_pembayaran') }}" method="POST">
                    
                    <!-- Pilih Penghuni -->
                    <div class="mb-3">
                        <label for="penghuni_id" class="form-label">Pilih Penghuni</label>
                        <select class="form-select" id="penghuni_id" name="penghuni_id" required>
                            <option value="" disabled selected>-- Pilih Penghuni Kos --</option>
                            {% for p in penghuni_list %}
                                <option value="{{ p.id }}">{{ p.nama }} (Kamar {{ p.no_kamar }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Tanggal Bayar -->
                    <div class="mb-3">
                        <label for="tanggal_bayar" class="form-label">Tanggal Bayar</label>
                        <input type="date" class="form-control" id="tanggal_bayar" name="tanggal_bayar" required>
                    </div>

                    <!-- Bulan Tagihan -->
                    <div class="mb-3">
                        <label for="bulan_tagihan" class="form-label">Bulan Tagihan</label>
                        <input type="text" class="form-control" id="bulan_tagihan" name="bulan_tagihan" placeholder="Contoh: Januari 2026" required>
                    </div>

                    <!-- Jumlah Nominal -->
                    <div class="mb-3">
                        <label for="jumlah" class="form-label">Jumlah Pembayaran (Rp)</label>
                        <input type="number" class="form-control" id="jumlah" name="jumlah" placeholder="Contoh: 500000" min="0" required>
                    </div>

                    <!-- Status Pembayaran -->
                    <div class="mb-3">
                        <label for="status" class="form-label">Status Pembayaran</label>
                        <select class="form-select" id="status" name="status" required>
                            <option value="Lunas">Lunas</option>
                            <option value="Belum Lunas">Belum Lunas</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('pembayaran') }}" class="btn btn-secondary">Kembali</a>
                        <button type="submit" class="btn btn-success">Simpan Pembayaran</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
