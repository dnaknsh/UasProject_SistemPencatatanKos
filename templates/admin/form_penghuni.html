{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Tambah Penghuni Kos</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('tambah_penghuni') }}" method="POST">
                    
                    <!-- Nama Lengkap -->
                    <div class="mb-3">
                        <label for="nama" class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" id="nama" name="nama" placeholder="Contoh: Budi Santoso" required>
                    </div>

                    <!-- Nomor Kamar -->
                    <div class="mb-3">
                        <label for="no_kamar" class="form-label">Nomor Kamar</label>
                        <input type="text" class="form-control" id="no_kamar" name="no_kamar" placeholder="Contoh: A01" required>
                    </div>

                    <!-- Nomor HP / WA -->
                    <div class="mb-3">
                        <label for="no_hp" class="form-label">Nomor HP / WhatsApp</label>
                        <input type="tel" class="form-control" id="no_hp" name="no_hp" placeholder="Contoh: 081234567890" required>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('penghuni') }}" class="btn btn-secondary">Kembali</a>
                        <button type="submit" class="btn btn-success">Simpan Data</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
